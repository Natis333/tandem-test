<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Encuesta de Bienestar | minders.psico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="app">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <main id="survey-container">
            <section id="question-screen" class="screen active">
                <div class="content">
                    <div class="branding">minders.psico × Tandem</div>
                    <div class="question-number">Paso <span id="current-number">1</span></div>

                    <h2 id="question-text">Iniciando...</h2>

                    <div id="input-container" class="input-container"></div>

                    <div id="controls" class="controls">
                        <button id="next-btn" class="btn-primary" onclick="handleNext()">Continuar</button>
                        <p class="press-enter">o presiona <strong>Enter</strong></p>
                    </div>
                </div>
            </section>

            <section id="final-screen" class="screen">
                <div class="content">
                    <div class="branding">minders.psico × Tandem</div>
                    <div class="question-number">Finalizado</div>

                    <div class="success-icon">✨</div>
                    <h2>¡Gracias por tu honestidad!</h2>
                    <p>Tus respuestas han sido recibidas. Estamos trabajando para que tu experiencia en el Colegio
                        Tandem sea la mejor.</p>
                </div>
            </section>
        </main>
    </div>

    <script>window.SURVEY_TYPE = 'pre';</script>
    <script src="js/app.js"></script>
</body>

</html>
